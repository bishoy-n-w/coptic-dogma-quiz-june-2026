<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coptic Orthodox Dogma Survey</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --correct-color: #27ae60;
            --wrong-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            margin: 0 0 10px 0;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e1e8ed;
            transition: all 0.3s ease;
        }

        .question-card:hover {
            box-shadow: 0 6px 12px rgba(0,0,0,0.12);
        }

        .question-text-en {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .question-text-ar {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 25px;
            direction: rtl;
            font-family: 'Arial', sans-serif;
            color: var(--secondary-color);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 8px;
            background: #f1f3f5;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 0.95em;
            font-weight: 500;
            user-select: none;
        }

        .option-label .ar-opt {
            font-size: 0.9em;
            margin-top: 4px;
            color: #555;
        }

        .option-label:hover:not(.disabled) {
            background: #e9ecef;
            border-color: #ced4da;
        }

        .option-label input[type="radio"] {
            display: none;
        }

        /* Classes added via JS after answer */
        .options-grid.answered .option-label {
            cursor: default;
        }

        .option-label.correct-choice {
            background-color: var(--correct-color) !important;
            color: white !important;
            border-color: #219653 !important;
        }

        .option-label.correct-choice .ar-opt {
            color: #e8f5e9 !important;
        }

        .option-label.wrong-choice {
            background-color: var(--wrong-color) !important;
            color: white !important;
            border-color: #c0392b !important;
        }

        .option-label.wrong-choice .ar-opt {
            color: #fce4ec !important;
        }

        .option-label.dimmed-choice {
            opacity: 0.4;
            background: #f8f9fa;
        }

        .feedback-section {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 6px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .feedback-section.correct {
            background-color: #e8f8f5;
            border-left: 5px solid var(--correct-color);
        }

        .feedback-section.wrong {
            background-color: #fdedec;
            border-left: 5px solid var(--wrong-color);
        }

        .result-title {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 15px;
        }

        .correct .result-title { color: var(--correct-color); }
        .wrong .result-title { color: var(--wrong-color); }

        .correct-view-box {
            background: rgba(255,255,255,0.6);
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 0.95em;
            color: #333;
            border: 1px dashed #ccc;
        }

        .explanation {
            margin-bottom: 15px;
            font-size: 1.05em;
        }

        .explanation .ar {
            direction: rtl;
            margin-top: 8px;
            color: var(--secondary-color);
            font-family: 'Arial', sans-serif;
        }

        .verses {
            background: rgba(255,255,255,0.8);
            padding: 15px;
            border-radius: 6px;
            font-style: italic;
            border: 1px solid #e1e8ed;
        }

        .verses .verse-ref {
            font-weight: bold;
            font-style: normal;
            display: block;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .verses .ar-verse {
            direction: rtl;
            margin-top: 15px;
            font-family: 'Arial', sans-serif;
        }

        /* Fullscreen Button Styles */
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 18px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fullscreen-btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
        }

        .fullscreen-btn:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>

<button id="fullscreen-toggle" class="fullscreen-btn" onclick="toggleFullScreen()">

    const options = ["Strongly agree", "Agree", "Not sure", "Disagree", "Strongly disagree"];

    function renderSurvey() {
        const container = document.getElementById('survey-container');
        
        surveyData.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${index}`;
            
            // Generate HTML for options
            let optionsHtml = '';
            options.forEach(opt => {
                optionsHtml += `
                    <label class="option-label" data-value="${opt}" onclick="handleSelect(${index}, '${opt}')">
                        <input type="radio" name="q${index}" value="${opt}">
                        ${opt}
                        <div class="ar-opt">${arOptions[opt]}</div>
                    </label>
                `;
            });

            card.innerHTML = `
                <div class="question-text-en">${index + 1}. ${q.en}</div>
                <div class="question-text-ar">${q.ar}</div>
                
                <div class="options-grid" id="options-${index}">
                    ${optionsHtml}
                </div>

                <div class="feedback-section" id="feedback-${index}">
                    <div class="result-title" id="result-title-${index}"></div>
                    
                    <div class="explanation">
                        <strong>Explanation:</strong> ${q.exp_en}
                        <div class="ar"><strong>الشرح:</strong> ${q.exp_ar}</div>
                    </div>
                    
                    <div class="verses">
                        <span class="verse-ref">${q.verse_ref_en}</span>
                        "${q.verse_en}"
                        <div class="ar-verse">
                            <span class="verse-ref">${q.verse_ref_ar}</span>
                            "${q.verse_ar}"
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Function exposed to window to handle the click logic
    window.handleSelect = function(questionIndex, selectedValue) {
        const questionData = surveyData[questionIndex];
        const optionsContainer = document.getElementById(`options-${questionIndex}`);
        
        // Prevent changing answer if already answered
        if (optionsContainer.classList.contains('answered')) return;
        
        optionsContainer.classList.add('answered');
        const labels = optionsContainer.getElementsByClassName('option-label');
        const correctAnswer = questionData.correctAnswer;
        const isCorrect = (selectedValue === correctAnswer);

        // Apply colors and styling to the options
        for (let label of labels) {
            const labelValue = label.getAttribute('data-value');
            
            if (labelValue === correctAnswer) {
                // Always highlight the correct answer in green
                label.classList.add('correct-choice');
            } else if (labelValue === selectedValue && !isCorrect) {
                // If they picked wrong, highlight their choice in red
                label.classList.add('wrong-choice');
            } else {
                // Dim the unselected options
                label.classList.add('dimmed-choice');
            }
        }

        // Setup Feedback Display
        const feedbackDiv = document.getElementById(`feedback-${questionIndex}`);
        const resultTitle = document.getElementById(`result-title-${questionIndex}`);
        
        feedbackDiv.className = 'feedback-section';
        
        if (isCorrect) {
            feedbackDiv.classList.add('correct');
            resultTitle.innerHTML = '✓ Correct / إجابة صحيحة';
        } else {
            feedbackDiv.classList.add('wrong');
            resultTitle.innerHTML = `
                ✗ Incorrect / إجابة خاطئة
                <div class="correct-view-box">
                    <strong>The correct Orthodox view is:</strong> ${correctAnswer}<br>
                    <strong style="direction: rtl; display: block; margin-top: 5px;">الرأي الأرثوذكسي الصحيح هو: ${arOptions[correctAnswer]}</strong>
                </div>
            `;
        }
        
        feedbackDiv.style.display = 'block';
    }

    // Fullscreen Toggle Logic
    window.toggleFullScreen = function() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error attempting to enable fullscreen: ${err.message}`);
            });
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    // Update button text when fullscreen state changes (e.g., via ESC key)
    document.addEventListener('fullscreenchange', () => {
        const btn = document.getElementById('fullscreen-toggle');
        if (document.fullscreenElement) {
            btn.innerHTML = '✖ Exit Fullscreen';
        } else {
            btn.innerHTML = '⛶ Fullscreen';
        }
    });

    // Initialize application on DOM load
    document.addEventListener('DOMContentLoaded', renderSurvey);
</script>
